services:
  portfolio:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
      target: build
    container_name: devops-portfolio-dev
    command: npm run dev -- --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    restart: unless-stopped